<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>인생역전 - 프리미엄 로또 생성기</title>
    <link rel="stylesheet" href="./styles.css" />
</head>
<body>
    <main class="page">
        <section class="hero">
            <h1>인생역전</h1>
            <p>최근 10회 당첨 내역, 최다 출현 번호 TOP 10, 5줄 전체 랜덤까지 한 번에 확인하세요.</p>
        </section>

        <section class="layout">
            <div class="generator card">
                <div class="toolbar">
                    <div class="mode-toggle" aria-label="번호 선택 모드">
                        <label class="mode-option"><input type="radio" name="selectMode" value="include" checked /> 번호 고정</label>
                        <label class="mode-option"><input type="radio" name="selectMode" value="exclude" /> 번호 제외</label>
                    </div>
                    <div class="batch-actions">
                        <button class="btn btn-gold" id="autoAllButton" type="button">전체 랜덤 5줄</button>
                        <button class="btn" id="clearAllButton" type="button">전체 초기화</button>
                    </div>
                </div>

                <div class="status-bar" id="statusMessage" aria-live="polite">최근 회차 정보를 불러오는 중입니다.</div>
                <div class="number-pool" id="numberPool"></div>
                <div class="rows" id="rowsContainer"></div>
                <p class="footer-note">전체 랜덤은 제외 번호를 피해 5줄을 한 번에 채웁니다. 각 줄은 개별 자동 생성도 지원합니다.</p>
            </div>

            <div class="side">
                <aside class="panel card">
                    <div class="panel-head">
                        <h2>최근 10회 당첨 내역</h2>
                        <span id="historyMeta">불러오는 중</span>
                    </div>
                    <div class="list" id="historyList">
                        <div class="placeholder">최근 회차 정보를 불러오는 중입니다.</div>
                    </div>
                </aside>

                <aside class="panel card">
                    <div class="panel-head">
                        <h2>최다 출현 번호 TOP 10</h2>
                        <span id="rankMeta">통계 계산 중</span>
                    </div>
                    <div class="list" id="rankList">
                        <div class="placeholder">누적 회차 통계를 계산하는 중입니다.</div>
                    </div>
                </aside>
            </div>
        </section>
    </main>

    <script src="./app.js"></script>
</body>
</html>
