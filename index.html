<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>인생역전 - 프리미엄 로또 생성기</title>
    <style>
        /* 모든 요소의 여백/테두리를 크기 계산에 포함 */
        * { box-sizing: border-box; }
        
        /* 전체 화면 고정 (스크롤 제거) */
        body { 
            font-family: 'Pretendard', sans-serif; background-color: #1a1a1a; color: #f5f5f5; 
            margin: 0; padding: 20px 10px; 
            height: 100vh; overflow: hidden; /* 전체 스크롤바 제거의 핵심 */
            display: flex; flex-direction: column; align-items: center; 
        }
        
        h1 { color: #d4af37; margin: 0 0 15px 0; text-shadow: 0 2px 10px rgba(212, 175, 55, 0.3); font-size: 2rem; }
        
        /* 3단 분할 레이아웃 컨테이너 */
        .layout-container { 
            display: flex; gap: 20px; max-width: 1200px; width: 100%; 
            height: calc(100vh - 80px); /* 헤더 공간을 뺀 나머지 높이 꽉 채우기 */
            justify-content: center;
        }
        
        /* 왼쪽: 메인 생성기 영역 */
        .main-content { 
            flex: 1.2; min-width: 450px; 
            display: flex; flex-direction: column; align-items: center; 
        }
        
        /* 오른쪽: 사이드바 영역 (2단으로 다시 나눔) */
        .sidebar-wrapper {
            flex: 1.5; display: flex; gap: 15px; 
            min-height: 0; /* Flex 자식 내부 스크롤을 위한 필수 속성 */
        }
        
        /* 패널 공통 스타일 (최근 10회, TOP 10) */
        .panel { 
            flex: 1; background-color: #222; border: 1px solid #444; border-radius: 12px; 
            padding: 15px; display: flex; flex-direction: column; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
        }
        .panel-title { color: #d4af37; margin: 0 0 10px 0; font-size: 1rem; border-bottom: 1px solid #444; padding-bottom: 8px; text-align: center; }

        /* 내부 스크롤 영역 */
        .scrollable-list { 
            flex: 1; overflow-y: auto; padding-right: 5px; display: flex; flex-direction: column; gap: 8px; 
        }
        /* 커스텀 스크롤바 */
        .scrollable-list::-webkit-scrollbar { width: 5px; }
        .scrollable-list::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
        
        /* 리스트 아이템 스타일 압축 */
        .history-item { background: #2a2a2a; padding: 8px; border-radius: 8px; font-size: 0.8rem; }
        .history-header { display: flex; justify-content: space-between; margin-bottom: 6px; color: #aaa; font-weight: bold; }
        .history-balls { display: flex; gap: 3px; justify-content: center; align-items: center; }
        .mini-ball { width: 22px; height: 22px; border-radius: 50%; background: #d4af37; color: #000; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 0.7rem; }
        .mini-ball.bonus { background: #2c1a1a; border: 1px solid #e74c3c; color: #e74c3c; }
        .mini-plus { color: #888; font-size: 0.8rem; }

        .rank-item { display: flex; align-items: center; justify-content: space-between; background: #2a2a2a; padding: 6px 12px; border-radius: 6px; }
        .rank-num { display: flex; align-items: center; gap: 8px; }
        .rank-badge { background: #444; color: #fff; width: 18px; height: 18px; display: flex; justify-content: center; align-items: center; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        .rank-item:nth-child(1) .rank-badge { background: #d4af37; color: #000; }
        .rank-item:nth-child(2) .rank-badge { background: #c0c0c0; color: #000; }
        .rank-item:nth-child(3) .rank-badge { background: #cd7f32; color: #000; }
        .rank-ball { width: 26px; height: 26px; border-radius: 50%; background: #111; border: 2px solid #555; color: #fff; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 0.85rem; }
        .rank-count { color: #aaa; font-size: 0.8rem; }

        /* 메인 UI 압축 */
        .mode-toggle { display: flex; gap: 15px; margin-bottom: 15px; background-color: #2a2a2a; padding: 8px 15px; border-radius: 20px; font-size: 0.9rem; }
        .mode-toggle label { cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 6px; color: #bbb; }
        .mode-toggle input[type="radio"] { accent-color: #d4af37; cursor: pointer; }
        .mode-toggle label:has(input:checked) { color: #fff; }
        
        .number-pool { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 15px; max-width: 350px; width: 100%; }
        .num-btn { background-color: #333; color: white; border: 1px solid #555; border-radius: 50%; width: 34px; height: 34px; cursor: pointer; transition: all 0.2s; font-size: 0.9rem; }
        .num-btn:hover { background-color: #555; }
        .num-btn.selected { background-color: #d4af37; color: #000; font-weight: bold; border-color: #d4af37; transform: scale(1.1); }
        .num-btn.excluded { background-color: #2a1a1a; color: #888; border-color: #552222; text-decoration: line-through; opacity: 0.6; }
        
        .results-container { width: 100%; display: flex; flex-direction: column; gap: 10px; }
        .row { display: flex; align-items: center; background-color: #2a2a2a; padding: 10px; border-radius: 8px; border: 2px solid transparent; transition: border-color 0.3s; }
        .row.active { border-color: #d4af37; box-shadow: 0 0 8px rgba(212, 175, 55, 0.2); }
        .row-header { display: flex; flex-direction: column; width: 50px; margin-right: 5px;}
        .row-label { font-weight: bold; color: #aaa; margin-bottom: 2px; font-size: 0.9rem; }
        .type-badge { font-size: 0.65rem; padding: 2px; border-radius: 4px; text-align: center; font-weight: bold; }
        .type-manual { background-color: #8e44ad; color: white; } 
        .type-half { background-color: #d35400; color: white; }  
        .type-auto { background-color: #2c3e50; color: white; }  
        
        .slots { display: flex; gap: 6px; flex-grow: 1; justify-content: center; }
        .slot { width: 34px; height: 34px; border-radius: 50%; background-color: #111; border: 2px dashed #555; display: flex; justify-content: center; align-items: center; font-weight: bold; color: #555; font-size: 0.9rem; transition: transform 0.1s; }
        .slot.filled { background-color: #d4af37; border: 2px solid #d4af37; box-shadow: inset -2px -2px 4px rgba(0,0,0,0.3); color: #000; }
        .slot.animating { background-color: #fff; border-color: #fff; color: #000; transform: scale(1.1); }
        
        .controls { display: flex; gap: 6px; align-items: center; }
        .controls label { cursor: pointer; font-size: 0.8rem; color: #ddd; display: flex; align-items: center; gap: 3px; }
        .action-btn { background-color: #444; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .action-btn:hover { background-color: #666; }
        .action-btn.auto { background-color: #2c5e3b; }
        .action-btn.auto:hover { background-color: #3b7c4f; }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

    <h1>인생역전</h1>

    <div class="layout-container">
        <div class="main-content">
            <div class="mode-toggle">
                <label><input type="radio" name="selectMode" value="include" checked onchange="changeMode('include')"> 🟢 고정수</label>
                <label><input type="radio" name="selectMode" value="exclude" onchange="changeMode('exclude')"> 🔴 제외수</label>
            </div>
            <div class="number-pool" id="numberPool"></div>
            <div class="results-container" id="rowsContainer"></div>
        </div>

        <div class="sidebar-wrapper">
            <div class="panel">
                <h3 class="panel-title">최근 10회 당첨 내역</h3>
                <div class="scrollable-list" id="historyList">
                    </div>
            </div>

            <div class="panel">
                <h3 class="panel-title">최다 당첨 번호 TOP 10</h3>
                <div class="scrollable-list" id="rankList">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // --- 상태 관리 ---
        let state = {
            activeRowIndex: 0,
            selectMode: 'include',
            excludedNumbers: [],
            rowsData: Array(5).fill().map(() => ({ numbers: [], type: '' }))
        };
        let isAnimating = false;

        // --- 초기화 ---
        function init() {
            const savedState = localStorage.getItem('lottoStatePremium');
            if (savedState) {
                state = JSON.parse(savedState);
                document.querySelector(`input[value="${state.selectMode}"]`).checked = true;
            }
            renderNumberPool();
            renderRows();
            updateNumberPoolUI();
            
            fetchRecentHistory();
            fetchTopStats();
        }

        function saveState() { localStorage.setItem('lottoStatePremium', JSON.stringify(state)); }
        function changeMode(mode) { state.selectMode = mode; saveState(); }

        // --- 메인 생성기 로직 ---
        function renderNumberPool() {
            const pool = document.getElementById('numberPool');
            pool.innerHTML = '';
            for (let i = 1; i <= 45; i++) {
                const btn = document.createElement('button');
                btn.className = 'num-btn';
                btn.textContent = i;
                btn.dataset.num = i;
                btn.addEventListener('click', () => handleNumberClick(i));
                pool.appendChild(btn);
            }
        }

        function renderRows() {
            const container = document.getElementById('rowsContainer');
            container.innerHTML = '';
            state.rowsData.forEach((row, index) => {
                const rowDiv = document.createElement('div');
                rowDiv.className = `row ${state.activeRowIndex === index ? 'active' : ''}`;
                
                const headerDiv = document.createElement('div');
                headerDiv.className = 'row-header';
                headerDiv.innerHTML = `<div class="row-label">${index + 1}조</div>`;
                if (row.type) {
                    let bClass = row.type === '수동' ? 'type-manual' : (row.type === '반자동' ? 'type-half' : 'type-auto');
                    headerDiv.innerHTML += `<div class="type-badge ${bClass}">${row.type}</div>`;
                }
                
                const slotsDiv = document.createElement('div');
                slotsDiv.className = 'slots';
                slotsDiv.id = `slots-${index}`;
                for (let j = 0; j < 6; j++) {
                    const slot = document.createElement('div');
                    slot.className = `slot ${row.numbers[j] ? 'filled' : ''}`;
                    slot.textContent = row.numbers[j] || '';
                    slotsDiv.appendChild(slot);
                }
                
                const controlsDiv = document.createElement('div');
                controlsDiv.className = 'controls';
                controlsDiv.innerHTML = `
                    <label><input type="radio" name="manualSelect" value="${index}" ${state.activeRowIndex === index ? 'checked' : ''}> 수동</label>
                `;
                
                const radioInput = controlsDiv.querySelector('input');
                radioInput.addEventListener('change', (e) => {
                    if(isAnimating) return;
                    state.activeRowIndex = parseInt(e.target.value);
                    updateAllUI();
                });

                const autoBtn = document.createElement('button');
                autoBtn.className = 'action-btn auto';
                autoBtn.textContent = '자동';
                autoBtn.disabled = isAnimating;
                autoBtn.addEventListener('click', () => handleAutoClick(index));

                const clearBtn = document.createElement('button');
                clearBtn.className = 'action-btn';
                clearBtn.textContent = '초기화';
                clearBtn.disabled = isAnimating;
                clearBtn.addEventListener('click', () => {
                    state.rowsData[index] = { numbers: [], type: '' };
                    updateAllUI();
                });

                controlsDiv.appendChild(autoBtn);
                controlsDiv.appendChild(clearBtn);

                rowDiv.append(headerDiv, slotsDiv, controlsDiv);
                container.appendChild(rowDiv);
            });
        }

        function handleNumberClick(num) {
            if (isAnimating) return;
            if (state.selectMode === 'exclude') {
                if (state.excludedNumbers.includes(num)) {
                    state.excludedNumbers = state.excludedNumbers.filter(n => n !== num);
                } else {
                    if (state.rowsData.some(row => row.numbers.includes(num))) return alert('이미 고정수로 선택된 번호입니다.');
                    if (state.excludedNumbers.length >= 39) return alert('제외수가 너무 많습니다.');
                    state.excludedNumbers.push(num);
                }
            } else {
                if (state.excludedNumbers.includes(num)) return alert('제외수로 설정된 번호입니다.');
                const activeRow = state.rowsData[state.activeRowIndex];
                if (activeRow.numbers.includes(num)) {
                    activeRow.numbers = activeRow.numbers.filter(n => n !== num);
                } else if (activeRow.numbers.length < 6) {
                    activeRow.numbers.push(num);
                    activeRow.numbers.sort((a, b) => a - b);
                } else return alert('이미 6개를 모두 선택했습니다.');
                
                activeRow.type = activeRow.numbers.length === 6 ? '수동' : (activeRow.numbers.length > 0 ? '작성중..' : '');
            }
            updateAllUI();
        }

        async function handleAutoClick(index) {
            if (isAnimating) return;
            const targetRow = state.rowsData[index];
            const currentNums = [...targetRow.numbers]; 
            if (currentNums.length === 6) return alert('이미 번호가 꽉 찼습니다.');

            const pool = Array.from({length: 45}, (_, i) => i + 1).filter(n => !currentNums.includes(n) && !state.excludedNumbers.includes(n));
            const neededCount = 6 - currentNums.length;
            if (pool.length < neededCount) return alert('제외수가 너무 많습니다!');

            const newNumbers = [];
            while (newNumbers.length < neededCount) {
                const randomIndex = Math.floor(Math.random() * pool.length);
                newNumbers.push(pool.splice(randomIndex, 1)[0]);
            }
            
            isAnimating = true;
            updateNumberPoolUI();
            
            const slotsDiv = document.getElementById(`slots-${index}`);
            const emptySlots = Array.from(slotsDiv.children).filter(slot => !slot.classList.contains('filled'));
            
            for (let i = 0; i < emptySlots.length; i++) {
                await new Promise(resolve => {
                    emptySlots[i].classList.add('animating');
                    let count = 0;
                    const interval = setInterval(() => {
                        emptySlots[i].textContent = Math.floor(Math.random() * 45) + 1;
                        if (++count > 10) {
                            clearInterval(interval);
                            emptySlots[i].textContent = newNumbers[i];
                            emptySlots[i].className = 'slot filled';
                            setTimeout(resolve, 80);
                        }
                    }, 40);
                });
            }

            targetRow.numbers = [...currentNums, ...newNumbers].sort((a, b) => a - b);
            targetRow.type = currentNums.length > 0 ? '반자동' : '자동';
            isAnimating = false;
            updateAllUI();
        }

        function updateAllUI() { renderRows(); updateNumberPoolUI(); saveState(); }

        function updateNumberPoolUI() {
            const buttons = document.querySelectorAll('.num-btn');
            const activeData = state.rowsData[state.activeRowIndex].numbers;
            buttons.forEach(btn => {
                const num = parseInt(btn.dataset.num);
                btn.style.pointerEvents = isAnimating ? 'none' : 'auto';
                btn.className = 'num-btn';
                if (state.excludedNumbers.includes(num)) btn.classList.add('excluded');
                else if (activeData.includes(num)) btn.classList.add('selected');
            });
        }

        // --- 사이드바 데이터 렌더링 ---
        function fetchRecentHistory() {
            const historyMock = [
                { no: 1109, date: '2024-03-02', nums: [10, 12, 13, 19, 33, 40], bonus: 2 },
                { no: 1108, date: '2024-02-24', nums: [7, 19, 26, 37, 39, 44], bonus: 27 },
                { no: 1107, date: '2024-02-17', nums: [6, 14, 30, 31, 40, 41], bonus: 29 },
                { no: 1106, date: '2024-02-10', nums: [1, 3, 4, 29, 42, 45], bonus: 36 },
                { no: 1105, date: '2024-02-03', nums: [6, 16, 34, 37, 39, 40], bonus: 11 },
                { no: 1104, date: '2024-01-27', nums: [1, 7, 21, 30, 35, 38], bonus: 2 },
                { no: 1103, date: '2024-01-20', nums: [10, 12, 29, 31, 40, 44], bonus: 2 },
                { no: 1102, date: '2024-01-13', nums: [13, 14, 22, 26, 37, 38], bonus: 20 },
                { no: 1101, date: '2024-01-06', nums: [6, 7, 13, 28, 36, 42], bonus: 41 },
                { no: 1100, date: '2023-12-30', nums: [17, 26, 29, 30, 31, 43], bonus: 12 }
            ];

            const listEl = document.getElementById('historyList');
            historyMock.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                let ballsHtml = item.nums.map(n => `<div class="mini-ball">${n}</div>`).join('');
                ballsHtml += `<div class="mini-plus">+</div><div class="mini-ball bonus">${item.bonus}</div>`;
                div.innerHTML = `
                    <div class="history-header"><span>제 ${item.no}회</span><span>${item.date}</span></div>
                    <div class="history-balls">${ballsHtml}</div>
                `;
                listEl.appendChild(div);
            });
        }

        function fetchTopStats() {
            const statsMock = [
                { num: 34, count: 192 }, { num: 43, count: 189 }, { num: 12, count: 187 },
                { num: 27, count: 185 }, { num: 18, count: 184 }, { num: 1, count: 182 },
                { num: 13, count: 181 }, { num: 14, count: 180 }, { num: 33, count: 179 },
                { num: 4, count: 178 }
            ];

            const rankEl = document.getElementById('rankList');
            statsMock.forEach((stat, index) => {
                const div = document.createElement('div');
                div.className = 'rank-item';
                div.innerHTML = `
                    <div class="rank-num"><div class="rank-badge">${index + 1}</div><div class="rank-ball">${stat.num}</div></div>
                    <div class="rank-count">${stat.count}회 당첨</div>
                `;
                rankEl.appendChild(div);
            });
        }

        init();
    </script>
</body>
</html>
